name: ci

# Build + test on every push to main and every PR. Pinned to Xcode 16
# (Swift 6) so SPM understands `swift-tools-version: 6.0` — the macos-14
# runner's default toolchain is Swift 5.10, which can't parse the
# manifest. Tests themselves use swift-testing as an SPM dep, so no
# Xcode-specific test infrastructure is required.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release --product sift

      - name: Test
        env:
          # Tests that touch Paths.siftHome must not see real state.
          SIFT_HOME: ${{ runner.temp }}/sift-test
        # --no-parallel: several suites mutate process-wide state
        # (SIFT_HOME, stderr fd, URLProtocol stubs). The whole suite
        # runs in <100 ms anyway.
        run: swift test --no-parallel
