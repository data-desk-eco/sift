name: ci

# Build + test on every push to main and every PR. Tests use
# swift-testing as an SPM dependency, so no Xcode is required —
# Command Line Tools (preinstalled on macos runners) is enough.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release --product sift

      - name: Test
        env:
          # Tests that touch Paths.siftHome must not see real state.
          SIFT_HOME: ${{ runner.temp }}/sift-test
        # --no-parallel: several suites mutate process-wide state
        # (SIFT_HOME, stderr fd, URLProtocol stubs). The whole suite
        # runs in <100 ms anyway.
        run: swift test --no-parallel
